project:
  phase: phase_c
  output_dir: outputs/phase_c
  random_state: 42

data:
  train_csv: data/tadpole_challenge/TADPOLE_D1_D2.csv
  d3_csv: data/tadpole_challenge/TADPOLE_D3.csv
  whitelist: outputs/phase_a/primary_whitelist.json
  feature_catalog: outputs/phase_a/feature_catalog.csv
  subject_col: RID
  visit_col: VISCODE
  date_col: EXAMDATE
  label_col: DX

deployment:
  full_feature_threshold: 0.95
  required_modalities: [demographic, cognitive, mri_structural, pet_fdg, pet_amyloid, genetic]

candidates:
  full:
    model: hist_gradient_boosting
    missing_indicators: false
  compact:
    model: random_forest
    missing_indicators: true
    features:
      - AGE
      - PTGENDER
      - PTEDUCAT
      - MMSE
      - ADAS11
      - ADAS13
      - CDRSB
      - RAVLT_immediate
      - RAVLT_learning
      - RAVLT_forgetting
      - RAVLT_perc_forgetting
      - FAQ_bl
      - Ventricles
      - Hippocampus
      - WholeBrain
      - Entorhinal
      - Fusiform
      - MidTemp
      - ICV
      - APOE4

preprocessing:
  numeric_impute: median

models:
  random_forest:
    n_estimators: 200
    max_depth: null
    class_weight: balanced
    random_state: 42
  hist_gradient_boosting:
    max_iter: 150
    learning_rate: 0.05
    max_leaf_nodes: 31
    random_state: 42
