project:
  name: AD-TabFusion Compact Fair Comparison
  phase: phase_b
  seed_list: [42, 43, 44, 45, 46]
  output_dir: outputs/phase_b

data:
  raw_csv: data/tadpole_challenge/TADPOLE_D1_D2.csv
  source_mode: compact_feature_projection_from_full_table
  subject_col: RID
  visit_col: VISCODE
  date_col: EXAMDATE
  label_col: DX
  task_mode: baseline_only
  features:
    - AGE
    - PTGENDER
    - PTEDUCAT
    - MMSE
    - ADAS11
    - ADAS13
    - CDRSB
    - RAVLT_immediate
    - RAVLT_learning
    - RAVLT_forgetting
    - RAVLT_perc_forgetting
    - FAQ_bl
    - Ventricles
    - Hippocampus
    - WholeBrain
    - Entorhinal
    - Fusiform
    - MidTemp
    - ICV
    - APOE4

preprocessing:
  numeric_impute: median
  categorical_impute: most_frequent
  add_missing_indicators: true

models:
  run: [logistic_regression, random_forest, hist_gradient_boosting]
  logistic_regression:
    C: 1.0
    max_iter: 2000
    class_weight: balanced
  random_forest:
    n_estimators: 200
    max_depth: null
    class_weight: balanced
  hist_gradient_boosting:
    max_iter: 150
    learning_rate: 0.05
    max_leaf_nodes: 31
